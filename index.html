<!DOCTYPE html>
<!-- UEE Recognition Training - v15.0 -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEE Recognition Training</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="css/styles.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>

    <div id="login-overlay">
        <h2 style="letter-spacing: 10px;">UEE ACCESS</h2>
        <input type="text" id="user-name" placeholder="PILOT CALLSIGN" maxlength="15">
        <button id="login-btn" style="width: 200px;">INITIALIZE</button>
    </div>

    <div id="boot-overlay" style="display:none;"><div id="boot-text"></div></div>

    <div id="summary-overlay" style="display:none;">
        <h2>SIMULATION TERMINATED</h2>
        <div style="margin: 20px 0;">
            <p>ASSETS IDENTIFIED: <span id="sum-score" style="color:#00d4ff;">0</span></p>
            <p>PILOT ACCURACY: <span id="sum-acc" style="color:#00d4ff;">0%</span></p>
            <p>PILOT RANK: <span id="sum-rank" style="color:#00d4ff;">---</span></p>
        </div>
        <button id="restart-btn" style="width: 200px;">REBOOT</button>
    </div>

    <div class="stats-bar">
        <div>PILOT: <span id="display-name" style="color:white;">---</span></div>
        <div>TIME: <span id="time-display" style="color: #ff3e3e;">60</span>S</div>
        <div>F-ID: <span id="score" style="color: #3effaf;">0</span></div>
    </div>

    <model-viewer 
        id="ship-viewer" 
        src="" 
        loading="eager"
        auto-rotate 
        camera-controls 
        touch-action="none"
        shadow-intensity="0"
        exposure="1.2"
        draco-decoder-path="https://www.gstatic.com/draco/versioned/decoders/1.5.6/">
    </model-viewer>

    <div class="interface">
        <div id="status-text">SYSTEM READY</div>
        <div class="options-grid" id="options"></div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
